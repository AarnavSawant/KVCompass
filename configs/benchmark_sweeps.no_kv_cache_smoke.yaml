sweep:
  name: no_kv_cache_smoke
  model: Qwen/Qwen2.5-1.5B-Instruct
  device: auto
  torch_dtype: bfloat16
  methods_config_path: configs/methods.yaml
  output_dir: results/benchmark_eval_no_kv_cache_smoke
  seed: 42
  verbose: false

  scenarios:
    - name: qa_4k_full_kv_cache
      dataset: ruler
      data_dir: "4096"
      task_prefixes:
        - hotpotqa
        - squality
      fraction: 0.01
      methods:
        - no_compression
      budgets:
        no_compression: [1.0]

    - name: qa_4k_no_kv_cache
      dataset: ruler
      data_dir: "4096"
      task_prefixes:
        - hotpotqa
        - squality
      fraction: 0.01
      use_kv_cache: false
      methods:
        - no_compression
      budgets:
        no_compression: [1.0]
