  - name: aggregation_4k
    dataset: ruler
    data_dir: '4096'
    task_prefixes:
    - cwe
    - fwe
    fraction: 1.0
    methods:
    - no_compression
    - snapkv
    - expected_attention
    - knorm
    - tova
    - streaming_llm
    budgets:
      no_compression:
      - 1.0
      default:
      - 0.5
  - name: aggregation_8k
    dataset: ruler
    data_dir: '8192'
    task_prefixes:
    - cwe
    - fwe
    fraction: 1.0
    methods:
    - no_compression
    - snapkv
    - expected_attention
    - knorm
    - tova
    - streaming_llm
    budgets:
      no_compression:
      - 1.0
      default:
