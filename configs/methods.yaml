methods:
  - name: no_compression
    kind: none
    description: Baseline with the standard dynamic KV cache and no compression press.

  - name: snapkv
    kind: press
    press_class: SnapKVPress
    params:
      window_size: 64
      kernel_size: 5
    description: SnapKV scorer-based compression from KVPress.

  - name: expected_attention
    kind: press
    press_class: ExpectedAttentionPress
    params:
      n_future_positions: 512
      n_sink: 4
      use_covariance: true
      use_vnorm: true
    description: Expected-attention scoring with future-position estimation.

  - name: streaming_llm
    kind: press
    press_class: StreamingLLMPress
    params:
      n_sink: 4
    description: StreamingLLM sliding-window compression with preserved sink tokens.

  - name: knorm
    kind: press
    press_class: KnormPress
    params: {}
    description: Simple key-norm pruning baseline.

  - name: tova
    kind: press
    press_class: TOVAPress
    params: {}
    description: TOVA last-token attention scoring for KV retention.
