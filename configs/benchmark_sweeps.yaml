sweep:
  name: ruler_core
  model: Qwen/Qwen2.5-1.5B-Instruct
  device: auto
  torch_dtype: bfloat16
  methods_config_path: configs/methods.yaml
  output_dir: results/benchmark_eval
  seed: 42
  verbose: false

  scenarios:
    - name: retrieval_long
      dataset: ruler
      data_dir: "4096"
      fraction: 0.01
      methods:
        - no_compression
        - snapkv
        - expected_attention
        - adakv_expected
        - quant_4bit
      budgets:
        no_compression: [1.0]
        default: [0.5]

    - name: memory_tight
      dataset: ruler
      data_dir: "4096"
      fraction: 0.01
      methods:
        - snapkv
        - expected_attention
        - adakv_expected
        - quant_4bit
      budgets:
        default: [0.25]
