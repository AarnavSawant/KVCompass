scenarios:
  - name: retrieval_long
    description: Realistic long-context retrieval with answer extraction from a buried fact.
    budgets: [1.0, 0.75, 0.5, 0.25]
    context_lengths: [4096, 8192]
    max_new_tokens: 32
    repeats: 1

  - name: reasoning_long
    description: Long-context reasoning with supporting facts spread across the prompt.
    budgets: [1.0, 0.5, 0.25]
    context_lengths: [4096]
    max_new_tokens: 64
    repeats: 1

  - name: context_sweep
    description: General workload to identify when compression becomes worthwhile across context sizes.
    budgets: [0.5]
    context_lengths: [1024, 4096, 8192]
    max_new_tokens: 32
    repeats: 1

  - name: prefix_serving
    description: Shared-prefix workload with repeated questions over the same long prompt.
    budgets: [1.0, 0.5]
    context_lengths: [4096, 8192]
    max_new_tokens: 32
    repeats: 3
